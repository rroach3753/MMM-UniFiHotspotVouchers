name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  lint-and-release-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: JavaScript syntax check
        run: |
          node --check MMM-UniFiHotspotVouchers.js
          node --check node_helper.js

      - name: Validate required project files
        run: |
          test -f README.md
          test -f LICENSE
          test -f CHANGELOG.md

      - name: Validate package version format
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Package version: $VERSION"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Ensure tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          [[ "$TAG_VERSION" == "$PKG_VERSION" ]]

      - name: npm pack dry-run
        run: npm pack --dry-run
